syntax = "proto3";

option csharp_namespace = "TC.Micro.Sample.Api";

package sample.v1;

// SampleService — gRPC 内部服务接口（供其他微服务调用）
service SampleService {
  // 根据 ID 查询 Sample
  rpc GetById (GetSampleByIdRequest) returns (SampleReply);

  // 分页查询 Sample 列表
  rpc GetList (GetSampleListRequest) returns (SampleListReply);

  // 创建 Sample
  rpc Create (CreateSampleRequest) returns (SampleReply);
}

// ── 请求消息 ──────────────────────────────────────────────────────────────

message GetSampleByIdRequest {
  string id        = 1;
  string tenant_id = 2;
}

message GetSampleListRequest {
  string tenant_id = 1;
  int32  page      = 2;
  int32  page_size = 3;
}

message CreateSampleRequest {
  string tenant_id = 1;
  string name      = 2;
  string remark    = 3;
  string user_id   = 4;
}

// ── 响应消息 ──────────────────────────────────────────────────────────────

message SampleReply {
  string id         = 1;
  string tenant_id  = 2;
  string name       = 3;
  string remark     = 4;
  string created_by = 5;
  int64  created_at = 6;
  int64  updated_at = 7;
}

message SampleListReply {
  repeated SampleReply items       = 1;
  int32                total_count = 2;
  int32                page        = 3;
  int32                page_size   = 4;
}
